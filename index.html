---
layout: default
---

<div class="posts">
  {% for post in site.posts %}
    <div class="post-wrapper">
      <a href="{{ site.baseurl }}{{ post.url }}" class="post-link-overlay" aria-label="Read {{ post.title | escape }}"></a>
      <article class="post">
        <h1>{{ post.title }}</h1>
        <div class="post-date">{{ post.date | date: "%B %e, %Y" }}</div>
        <div class="entry">
          {{ post.excerpt }}
        </div>
      </article>
    </div>
  {% endfor %}
</div>
