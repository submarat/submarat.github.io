<!DOCTYPE html>
<html>
  <head>
    <title>{% if page.title %}{{ page.title }} – {% endif %}{{ site.name }} – {{ site.description }}</title>

    {% include meta.html %}

    <script>
      MathJax = {
        tex: {
          inlineMath: [['\\(', '\\)']],
          displayMath: [['\\[', '\\]'], ['$$', '$$']]
        }
      };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" async></script>

    <!--[if lt IE 9]>
      <script src="http://html5shiv.googlecode.com/svn/trunk/html5.js"></script>
    <![endif]-->

    <link rel="icon" href="{{ site.baseurl }}/images/profile.jpeg" type="image/jpeg" />
    <link rel="stylesheet" type="text/css" href="{{ site.baseurl }}/style.css" />
    <link rel="alternate" type="application/rss+xml" title="{{ site.name }} - {{ site.description }}" href="{{ site.baseurl }}/feed.xml" />

    <!-- Created with Jekyll Now - http://github.com/barryclark/jekyll-now -->
  </head>

  <body>
    <div class="wrapper-masthead">
      <div class="container">
        <header class="masthead clearfix">
          <div class="site-info">
            <h1 class="site-name"><a href="{{ site.baseurl }}/">{{ site.name }}</a></h1>
          </div>

          <nav>
            <button type="button" id="theme-toggle" class="theme-toggle" aria-label="Toggle light/dark mode" title="Toggle light/dark mode"></button>
            <div class="highlighter-controls">
              <button type="button" id="pen-toggle" class="nav-pen-btn" aria-label="Highlighter" title="Highlighter">
                <svg class="highlighter-icon" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><g transform="rotate(-15 12 12)"><path fill="currentColor" d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></g></svg>
              </button>
              <button type="button" id="highlighter-clear" class="highlighter-clear" aria-label="Clear highlights" title="Clear highlights">Clear</button>
            </div>
            <a href="{{ site.baseurl }}/">Blog</a>
            <a href="{{ site.baseurl }}/archives">Archive</a>
            <a href="{{ site.baseurl }}/about">About</a>
          </nav>
        </header>
      </div>
    </div>

    <canvas id="draw-canvas" class="draw-canvas"></canvas>
    <div id="chess-modal" class="chess-modal hidden">
      <div class="chess-modal-backdrop"></div>
      <div class="chess-modal-content">
        <button type="button" class="chess-modal-close" aria-label="Close">&times;</button>
        <iframe src="https://submarat.github.io/chess/mini.html" title="Mini Chess"></iframe>
      </div>
    </div>

    <div id="main" role="main" class="container">
      {{ content }}
    </div>

    <div class="wrapper-footer">
      <div class="container">
        <footer class="footer">
          {% include svg-icons.html %}
        </footer>
      </div>
    </div>

    {% include analytics.html %}
    <script>
      (function() {
        var theme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
        var btn = document.getElementById('theme-toggle');
        function updateBtn() {
          var t = document.documentElement.getAttribute('data-theme');
          if (btn) {
            btn.textContent = t === 'dark' ? '\u263C' : '\u263E';
            btn.setAttribute('aria-label', t === 'dark' ? 'Switch to light mode' : 'Switch to dark mode');
          }
        }
        updateBtn();
        if (btn) {
          btn.addEventListener('click', function() {
            var next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            updateBtn();
          });
        }
      })();
    </script>
    <script>
      (function() {
        var modal = document.getElementById('chess-modal');
        var backdrop = modal && modal.querySelector('.chess-modal-backdrop');
        var closeBtn = modal && modal.querySelector('.chess-modal-close');

        function openModal() {
          if (modal) modal.classList.remove('hidden');
        }

        function closeModal() {
          if (modal) modal.classList.add('hidden');
        }

        document.addEventListener('click', function(e) {
          if (e.target.closest('.chess-stamp')) openModal();
        });
        if (backdrop) backdrop.addEventListener('click', closeModal);
        if (closeBtn) closeBtn.addEventListener('click', closeModal);

        (function() {
          var bounced = false;
          var stamps = document.querySelectorAll('.chess-stamp');
          if (!stamps.length) return;

          function checkScroll() {
            if (bounced) return;
            var scrollTop = window.pageYOffset || document.documentElement.scrollTop;
            var scrollHeight = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            if (scrollHeight <= 0) return;
            if (scrollTop >= scrollHeight - 80) {
              bounced = true;
              stamps.forEach(function(s) {
                s.classList.add('bounce');
                s.addEventListener('animationend', function() { s.classList.remove('bounce'); }, { once: true });
              });
            }
          }

          window.addEventListener('scroll', checkScroll, { passive: true });
          checkScroll();
        })();
      })();
    </script>
    <script>
      (function() {
        var penToggle = document.getElementById('pen-toggle');
        var canvas = document.getElementById('draw-canvas');
        var controlsEl = penToggle && penToggle.closest('.highlighter-controls');
        var clearBtn = document.getElementById('highlighter-clear');
        if (!penToggle || !canvas) return;

        var ctx = canvas.getContext('2d');
        var isDrawing = false;
        var justFinishedDrawing = false;
        var hasMoved = false;
        var lastX = 0, lastY = 0;
        var anchorY = 0;
        var lastTime = 0;
        var dpr = window.devicePixelRatio || 1;
        var strokeColor = '';
        var drawThreshold = 5;
        var highlights = [];
        var saveTimeout = 0;
        var storageKey = 'highlights-' + (window.location.pathname || '/');

        function loadHighlights() {
          try {
            var s = localStorage.getItem(storageKey);
            if (s) highlights = JSON.parse(s);
          } catch (_) { highlights = []; }
        }

        function saveHighlights() {
          clearTimeout(saveTimeout);
          saveTimeout = setTimeout(function() {
            try {
              localStorage.setItem(storageKey, JSON.stringify(highlights));
            } catch (_) {}
          }, 100);
        }

        function isClickable(el) {
          if (!el || !el.closest) return false;
          var clickable = el.closest('a, button, [role="button"], [role="link"], [onclick]');
          if (clickable) return true;
          var tag = (el.tagName || '').toLowerCase();
          return tag === 'a' || tag === 'button';
        }

        function redrawHighlights() {
          var isActive = canvas.classList.contains('drawing');
          ctx.save();
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
          ctx.clearRect(0, 0, canvas.width / dpr, canvas.height / dpr);
          if (isActive && highlights.length > 0) {
            var c = getComputedStyle(document.documentElement).getPropertyValue('--theme-highlight').trim() || 'rgba(255, 255, 0, 0.4)';
            ctx.fillStyle = c;
            for (var i = 0; i < highlights.length; i++) {
              var r = highlights[i];
              if (r.cx !== undefined) {
                ctx.save();
                ctx.translate(r.cx, r.cy);
                ctx.rotate(r.angle);
                ctx.fillRect(-r.length / 2, -r.strokeWidth / 2, r.length, r.strokeWidth);
                ctx.restore();
              } else {
                ctx.fillRect(r.x, r.y, r.w, r.h);
              }
            }
          }
          ctx.restore();
        }

        function resizeCanvas() {
          var w = document.documentElement.clientWidth;
          var h = Math.max(document.body.scrollHeight, document.documentElement.scrollHeight);
          canvas.width = w * dpr;
          canvas.height = h * dpr;
          canvas.style.width = w + 'px';
          canvas.style.height = h + 'px';
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
          ctx.lineCap = 'round';
          ctx.lineJoin = 'round';
          redrawHighlights();
        }

        function pressureToWidth(e) {
          var pressure = e.pressure;
          if (e.pointerType === 'pen' && pressure > 0 && pressure < 1) {
            return Math.max(1, (1 + pressure * 11) * 0.8);
          }
          var dx = e.pageX - lastX;
          var dy = e.pageY - lastY;
          var dist = Math.sqrt(dx * dx + dy * dy);
          var dt = Date.now() - lastTime;
          var speed = dt > 0 ? dist / dt : 0;
          lastTime = Date.now();
          var w = 12 - Math.min(11, Math.sqrt(speed) * 4);
          return Math.max(1, w * 0.8);
        }

        function disablePenMode() {
          canvas.classList.remove('drawing');
          penToggle.classList.remove('active');
          if (controlsEl) controlsEl.classList.remove('active');
          document.body.classList.remove('pen-drawing');
          strokeColor = '';
          redrawHighlights();
        }

        function startDraw(e) {
          if (!canvas.classList.contains('drawing')) return;
          if (!(e.buttons & 1)) return;
          if (isClickable(e.target)) return;
          hasMoved = false;
          lastX = e.pageX;
          lastY = e.pageY;
          lastTime = Date.now();
        }

        function draw(e) {
          if (!canvas.classList.contains('drawing')) return;
          if (!(e.buttons & 1)) {
            if (isDrawing) isDrawing = false;
            return;
          }
          if (!hasMoved) {
            var dx = e.pageX - lastX;
            var dy = e.pageY - lastY;
            if (Math.sqrt(dx * dx + dy * dy) < drawThreshold) return;
            hasMoved = true;
            isDrawing = true;
            e.preventDefault();
            return;
          }
          if (!isDrawing) return;
          e.preventDefault();
          var highlightColor = strokeColor || getComputedStyle(document.documentElement).getPropertyValue('--theme-highlight').trim() || 'rgba(255, 255, 0, 0.4)';
          var strokeWidth = 20;
          var dx = e.pageX - lastX;
          var dy = e.pageY - lastY;
          var length = Math.max(Math.sqrt(dx * dx + dy * dy), 2);
          var angle = -Math.PI / 12;
          var cx = (lastX + e.pageX) / 2;
          var cy = (lastY + e.pageY) / 2;
          ctx.fillStyle = highlightColor;
          ctx.save();
          ctx.translate(cx, cy);
          ctx.rotate(angle);
          ctx.fillRect(-length / 2, -strokeWidth / 2, length, strokeWidth);
          ctx.restore();
          highlights.push({ cx: cx, cy: cy, length: length, strokeWidth: strokeWidth, angle: angle });
          saveHighlights();
          lastX = e.pageX;
          lastY = e.pageY;
        }

        function endDraw(e) {
          if (e.type === 'pointerup' || e.type === 'pointerleave' || e.type === 'pointercancel') {
            if (isDrawing) {
              justFinishedDrawing = true;
              e.preventDefault();
              e.stopPropagation();
            }
            isDrawing = false;
          }
        }

        document.addEventListener('click', function(e) {
          if (justFinishedDrawing) {
            justFinishedDrawing = false;
            e.preventDefault();
            e.stopPropagation();
          }
        }, true);

        penToggle.addEventListener('click', function() {
          canvas.classList.toggle('drawing');
          penToggle.classList.toggle('active', canvas.classList.contains('drawing'));
          if (controlsEl) controlsEl.classList.toggle('active', canvas.classList.contains('drawing'));
          document.body.classList.toggle('pen-drawing', canvas.classList.contains('drawing'));
          strokeColor = '';
          redrawHighlights();
        });

        if (clearBtn) {
          clearBtn.addEventListener('click', function() {
            highlights = [];
            saveHighlights();
            redrawHighlights();
          });
        }

        document.addEventListener('keydown', function(e) {
          if (e.key === 'Escape') disablePenMode();
        });

        document.addEventListener('pointerdown', startDraw);
        document.addEventListener('pointermove', draw);
        document.addEventListener('pointerup', endDraw);
        document.addEventListener('pointerleave', endDraw);
        document.addEventListener('pointercancel', endDraw);

        loadHighlights();
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
      })();
    </script>
    <script>
      (function() {
        document.querySelectorAll('.post-wrapper[data-href]').forEach(function(wrapper) {
          wrapper.addEventListener('click', function(e) {
            if (e.target.closest('a')) return;
            var href = wrapper.getAttribute('data-href');
            if (href) window.location = href;
          });
          wrapper.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' || e.key === ' ') {
              e.preventDefault();
              var href = wrapper.getAttribute('data-href');
              if (href) window.location = href;
            }
          });
        });
      })();
    </script>
  </body>
</html>
